<style>
  :root {
    --bg:#08080d;--s1:#0f0f1a;--s2:#16162a;
    --ac:#6c5ce7;--ac2:#a29bfe;--gr:#55efc4;
    --tx:#eeeef7;--tx2:#9997b8;--tx3:#4a4860;
    --br:rgba(108,92,231,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden;position:relative;}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:var(--min);transform:scale(1);}50%{opacity:var(--max);transform:scale(1.4);}}
  .nebula{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:drift 12s ease-in-out infinite alternate;}
  .nebula-1{width:500px;height:500px;background:rgba(108,92,231,.12);top:-100px;left:-100px;}
  .nebula-2{width:400px;height:400px;background:rgba(85,239,196,.07);bottom:-100px;right:-100px;animation-delay:-6s;}
  .nebula-3{width:300px;height:300px;background:rgba(162,155,254,.08);top:40%;left:60%;animation-delay:-3s;}
  @keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(30px,20px) scale(1.08);}}
  .card{position:relative;z-index:1;background:linear-gradient(145deg,rgba(15,15,26,.95),rgba(22,22,42,.9));border:1px solid var(--br);border-radius:28px;padding:52px 48px 44px;max-width:520px;width:calc(100% - 40px);text-align:center;box-shadow:0 0 0 1px rgba(108,92,231,.08),0 40px 100px rgba(0,0,0,.7),0 0 80px rgba(108,92,231,.08);animation:cardIn .7s cubic-bezier(.16,1,.3,1) both;}
  @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  .logo-wrap{width:120px;height:120px;margin:0 auto 24px;filter:drop-shadow(0 0 28px rgba(108,92,231,.55));animation:logoFloat 4s ease-in-out infinite;}
  @keyframes logoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  h1{font-family:'Syne',sans-serif;font-size:30px;font-weight:900;letter-spacing:-1px;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .subtitle{font-size:14px;color:var(--tx2);margin-bottom:32px;line-height:1.6;}
  .version-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(108,92,231,.12);border:1px solid rgba(162,155,254,.2);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--ac2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:20px;}
  .version-dot{width:6px;height:6px;border-radius:50%;background:var(--gr);box-shadow:0 0 8px rgba(85,239,196,.8);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .file-card{display:flex;align-items:center;gap:14px;background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.25);border-radius:14px;padding:16px 18px;margin-bottom:20px;text-align:left;}
  .file-icon{font-size:32px;flex-shrink:0;}
  .file-details{flex:1;min-width:0;}
  .file-name{font-size:14px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .file-meta{font-size:11px;color:var(--tx3);margin-top:3px;}
  .dl-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--ac),#8b7cf8);border:none;border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .2s;box-shadow:0 4px 24px rgba(108,92,231,.4);position:relative;overflow:hidden;}
  .dl-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .2s;}
  .dl-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(108,92,231,.55);}
  .dl-btn:hover::before{opacity:1;}
  .dl-btn:active{transform:translateY(0);}
  .dl-btn .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:ripple .5s linear;pointer-events:none;}
  @keyframes ripple{to{transform:scale(4);opacity:0;}}
  
  
  
  
  
  
  .footer{position:relative;z-index:1;margin-top:24px;font-size:11px;color:var(--tx3);text-align:center;}
  .footer a{color:var(--ac2);text-decoration:none;}
  .footer a:hover{text-decoration:underline;}
  .success-flash{position:fixed;inset:0;background:rgba(85,239,196,.06);pointer-events:none;z-index:999;opacity:0;transition:opacity .3s;}
  .success-flash.on{opacity:1;}
</style>
</head>

  this.style.background='linear-gradient(135deg,#00b894,#55efc4)';
  setTimeout(()=>{
    this.innerHTML='<span style="font-size:18px;">⬇</span><span>Download index.html</span>';
    this.style.background='';
  },2500);
});
</script>
